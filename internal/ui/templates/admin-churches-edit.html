{{define "admin-churches-edit"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .IsNew}}New Church{{else}}Edit {{.Church.Name}}{{end}} - Admin</title>
    <link rel="stylesheet" href="/static/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Antic+Didone&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" defer></script>
</head>
<body>
    {{template "admin-sidebar" .}}

    <main class="admin-main">
        {{template "admin-topbar" .}}

        <div class="admin-content-area">
            <div class="card max-w-900 p-0">
                <div style="padding: 40px;">
                    <h1 class="mb-0 mt-0 text-bold" style="font-size: 1.8rem; margin-bottom: 30px;">{{if .IsNew}}New Church{{else}}Edit {{.Church.Name}}{{end}}</h1>
                    
                    <form hx-post="{{if .IsNew}}/admin/churches/new{{else}}/admin/churches/edit/{{.Church.Slug}}{{end}}" hx-push-url="false">
                        <div class="form-group">
                            <label for="name">Church Name</label>
                            <input type="text" id="name" name="name" value="{{if not .IsNew}}{{.Church.Name}}{{end}}" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="slug">Slug (leave empty to auto-generate)</label>
                                <input type="text" id="slug" name="slug" value="{{if not .IsNew}}{{.Church.Slug}}{{end}}" placeholder="e.g. st-nicholas-nyc">
                            </div>
                            <div class="form-group">
                                <label for="jurisdiction">Jurisdiction</label>
                                <input type="text" id="jurisdiction" name="jurisdiction" value="{{if and (not .IsNew) .Church.Jurisdiction.Valid}}{{.Church.Jurisdiction.String}}{{end}}" placeholder="e.g. GOARCH">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="address_text">Address</label>
                            <input type="text" id="address_text" name="address_text" value="{{if not .IsNew}}{{.Church.AddressText}}{{end}}" placeholder="123 Main St">
                        </div>

                        <div class="form-row-3">
                            <div class="form-group">
                                <label for="city">City</label>
                                <input type="text" id="city" name="city" value="{{if not .IsNew}}{{.Church.City}}{{end}}" required>
                            </div>
                            <div class="form-group">
                                <label for="state_province">State / Province</label>
                                <input type="text" id="state_province" name="state_province" value="{{if not .IsNew}}{{.Church.StateProvince}}{{end}}" required>
                            </div>
                            <div class="form-group">
                                <label for="postal_code">Postal Code</label>
                                <input type="text" id="postal_code" name="postal_code" value="{{if and (not .IsNew) .Church.PostalCode.Valid}}{{.Church.PostalCode.String}}{{end}}">
                            </div>
                        </div>

                        <div class="form-row-3">
                            <div class="form-group">
                                <label for="country_code">Country Code</label>
                                <input type="text" id="country_code" name="country_code" value="{{if .IsNew}}US{{else}}{{.Church.CountryCode}}{{end}}" required>
                            </div>
                            <div class="form-group">
                                <label for="latitude">Latitude</label>
                                <input type="number" step="any" id="latitude" name="latitude" value="{{if not .IsNew}}{{.Church.Latitude}}{{end}}" required>
                            </div>
                            <div class="form-group">
                                <label for="longitude">Longitude</label>
                                <input type="number" step="any" id="longitude" name="longitude" value="{{if not .IsNew}}{{.Church.Longitude}}{{end}}" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="website">Website</label>
                                <input type="url" id="website" name="website" value="{{if and (not .IsNew) .Church.Website.Valid}}{{.Church.Website.String}}{{end}}" placeholder="https://...">
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone</label>
                                <input type="tel" id="phone" name="phone" value="{{if and (not .IsNew) .Church.Phone.Valid}}{{.Church.Phone.String}}{{end}}">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" name="description" rows="4">{{if and (not .IsNew) .Church.Description.Valid}}{{.Church.Description.String}}{{end}}</textarea>
                        </div>

                        <div class="form-group">
                            <label for="status">Status</label>
                            <select id="status" name="status">
                                <option value="published" {{if or .IsNew (eq .Church.Status "published")}}selected{{end}}>Published</option>
                                <option value="draft" {{if and (not .IsNew) (eq .Church.Status "draft")}}selected{{end}}>Draft</option>
                            </select>
                        </div>

                        <div class="flex gap-15 mt-40">
                            <button type="submit" class="btn btn-primary">Save Church</button>
                            <a href="/admin/churches" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
{{end}}
