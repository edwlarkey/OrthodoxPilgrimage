{{define "content"}}
<div id="map"></div>
<div id="tooltip" class="ol-tooltip"></div>

<div class="sidebar {{if not .}}hidden{{end}}" id="sidebar">
    <div class="sidebar-header">
        <h2 id="sidebar-title">Details</h2>
        <button class="close-btn" onclick="toggleSidebar()" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>
    <div class="sidebar-content" id="church-details">
        {{if .}}
            {{if eq .Type "church"}}
                <div class="church-detail" id="church-{{.Church.ID}}">
                    {{template "church-detail" .}}
                </div>
            {{else if eq .Type "saint"}}
                <div class="saint-detail" id="saint-{{.Saint.ID}}">
                    {{template "saint-detail" .}}
                </div>
            {{end}}
        {{else}}
            <div class="loading">Select a location on the map to begin your pilgrimage.</div>
        {{end}}
    </div>
</div>

<button class="sidebar-toggle" onclick="toggleSidebar()" id="sidebar-toggle">
    Church Info
</button>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let initialZoom = 4;
    let initialCenter = [-98.5795, 39.8283];
    let fetchUrl = '/api/v1/churches';

    {{if .}}
        {{if eq .Type "church"}}
            initialCenter = [{{.Church.Longitude}}, {{.Church.Latitude}}];
            initialZoom = 12;
            document.getElementById('sidebar-title').innerText = "Church Info";
        {{else if eq .Type "saint"}}
            fetchUrl = '/api/v1/churches?saint={{.Saint.Slug}}';
            document.getElementById('sidebar-title').innerText = "Saint Info";
        {{end}}
    {{end}}

    const view = new ol.View({
        center: ol.proj.fromLonLat(initialCenter),
        zoom: initialZoom,
        constrainResolution: true,
        smoothExtentConstraint: true
    });
    
    const osmLayer = new ol.layer.Tile({ 
        source: new ol.source.OSM()
    });

    // Apply a filter to make it look modern and minimalist
    // osmLayer.on('prerender', (event) => {
    //     const ctx = event.context;
    //     ctx.save();
    //     ctx.filter = 'grayscale(75%) contrast(1.1) brightness(1.1)';
    // });

    // osmLayer.on('prerender', (event) => {
    //     const ctx = event.context;
    //     ctx.save();
    //     ctx.filter = 'contrast(1.1) brightness(1.1)';
    // });

    osmLayer.on('postrender', (event) => {
        const ctx = event.context;
        ctx.restore();
    });

    const map = new ol.Map({
        target: 'map',
        layers: [ osmLayer ],
        view: view
    });

    const tooltipElement = document.getElementById('tooltip');
    const tooltipOverlay = new ol.Overlay({
        element: tooltipElement,
        offset: [10, -10],
        positioning: 'bottom-left',
    });
    map.addOverlay(tooltipOverlay);

    const svgPin = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 21C16 17 20 13.4183 20 9C20 4.58172 16.4183 1 12 1C7.58172 1 4 4.58172 4 9C4 13.4183 8 17 12 21Z" fill="#3498db" stroke="white" stroke-width="1"/><circle cx="12" cy="9" r="3" fill="white"/></svg>';

    const iconStyle = new ol.style.Style({
        image: new ol.style.Icon({
            anchor: [0.5, 1],
            src: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgPin),
            scale: 1,
        }),
    });
    
    const vectorSource = new ol.source.Vector();
    const vectorLayer = new ol.layer.Vector({
        source: vectorSource,
        style: iconStyle,
    });
    map.addLayer(vectorLayer);

    window.toggleSidebar = function() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('hidden');
        document.getElementById('sidebar-toggle').style.display = sidebar.classList.contains('hidden') ? 'block' : 'none';
    }

    fetch(fetchUrl)
        .then(response => response.json())
        .then(churches => {
            if (churches.length === 0) return;
            const features = [];
            churches.forEach(church => {
                if (church.latitude && church.longitude) {
                    const feature = new ol.Feature({
                        geometry: new ol.geom.Point(ol.proj.fromLonLat([church.longitude, church.latitude])),
                        churchSlug: church.slug,
                        churchName: church.name
                    });
                    features.push(feature);
                }
            });
            vectorSource.addFeatures(features);
            
            {{if eq .Type "saint"}}
            if (features.length > 0) {
                const extent = vectorSource.getExtent();
                map.getView().fit(extent, { 
                    padding: [100, 100, 100, 100], 
                    duration: 1000,
                    maxZoom: 12 
                });
            }
            {{end}}
        })
        .catch(error => console.error('Error loading church data:', error));

    map.on('pointermove', function (e) {
        if (e.dragging) {
            tooltipElement.style.display = 'none';
            return;
        }
        const pixel = map.getEventPixel(e.originalEvent);
        const feature = map.forEachFeatureAtPixel(pixel, f => f);
        
        if (feature) {
            tooltipElement.style.display = 'block';
            tooltipOverlay.setPosition(e.coordinate);
            tooltipElement.innerText = feature.get('churchName');
            map.getTargetElement().style.cursor = 'pointer';
        } else {
            tooltipElement.style.display = 'none';
            map.getTargetElement().style.cursor = '';
        }
    });
    
    map.on('click', function (event) {
        const feature = map.forEachFeatureAtPixel(event.pixel, f => f);
        if (feature) {
            const slug = feature.get('churchSlug');
            document.getElementById('sidebar-title').innerText = "Church Info";
            htmx.ajax('GET', '/churches/' + slug, {
                target: '#church-details',
                swap: 'innerHTML'
            });
            
            // Pan and zoom to clicked church
            const coords = feature.getGeometry().getCoordinates();
            view.animate({ 
                center: coords, 
                zoom: 14,
                duration: 500 
            });
        }
    });

    document.body.addEventListener('htmx:afterSwap', function(event) {
        if (event.detail.target.id === 'church-details') {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('hidden')) {
                toggleSidebar();
            }
        }
    });
});
</script>
{{end}}
