{{define "admin-admins-list"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admins - Admin</title>
    <link rel="stylesheet" href="/static/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Antic+Didone&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" defer></script>
</head>
<body>
    {{template "admin-sidebar" .}}

    <main class="admin-main">
        {{template "admin-topbar" .}}

        <div class="admin-content-area">
            <div class="page-header">
                <h1>Admins</h1>
                <button class="btn btn-primary" hx-get="/admin/admins/new" hx-target="#admin-modal-content" hx-swap="innerHTML">Add New Admin</button>
            </div>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Created At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .Admins}}
                    <tr id="admin-{{.ID}}">
                        <td class="text-bold">{{.Username}}</td>
                        <td class="text-muted">{{if .CreatedAt.Valid}}{{.CreatedAt.Time.Format "Jan 02, 2006"}}{{else}}-{{end}}</td>
                        <td>
                            <div class="flex gap-10">
                                <button class="btn btn-danger" style="padding: 6px 12px; font-size: 0.8rem;"
                                        hx-delete="/admin/admins/delete?id={{.ID}}" 
                                        hx-confirm="Are you sure you want to delete this admin?"
                                        hx-target="#admin-{{.ID}}"
                                        hx-swap="outerHTML">Delete</button>
                            </div>
                        </td>
                    </tr>
                    {{else}}
                    <tr><td colspan="3" class="text-center text-muted py-40">No admins found.</td></tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </main>

    <div id="admin-modal-container" onclick="closeAdminModal(event)">
        <div class="admin-modal" onclick="event.stopPropagation()">
            <div id="admin-modal-content"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        function closeAdminModal(e) {
            document.getElementById('admin-modal-container').classList.remove('visible');
            document.getElementById('admin-modal-content').innerHTML = '';
        }

        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        document.body.addEventListener('htmx:afterSwap', function(evt) {
            if (evt.detail.target.id === 'admin-modal-content') {
                document.getElementById('admin-modal-container').classList.add('visible');
            }
        });

        document.body.addEventListener('adminToast', function(evt) {
            showToast(evt.detail.message, evt.detail.type);
            if (evt.detail.type === 'success' && evt.detail.message.includes('created')) {
                closeAdminModal();
                setTimeout(() => window.location.reload(), 1000);
            }
        });
    </script>
</body>
</html>
{{end}}
