{{define "admin-mfa"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFA Verification - Orthodox Pilgrimage</title>
    <link rel="stylesheet" href="/static/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Antic+Didone&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="login-card">
        <div class="login-header">
            <h1>MFA Required</h1>
            <p class="text-muted text-semibold mt-10 mb-0" style="font-size: 0.85rem;">Enter the 6-digit code from your authenticator app.</p>
        </div>
        
        {{if .Error}}
        <div class="error-msg">{{.Error}}</div>
        {{end}}

        <form action="/admin/mfa" method="POST">
            <div class="form-group">
                <input type="text" class="mfa-input" id="code" name="code" required autofocus autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000">
            </div>
            <button type="submit" class="btn btn-primary w-full mt-10">Verify</button>
        </form>
        <div class="text-center mt-20">
            <a href="/admin/logout" class="text-muted text-semibold" style="text-decoration: none; font-size: 0.85rem;">Cancel and Logout</a>
        </div>
    </div>
</body>
</html>
{{end}}
