{{define "admin-mfa"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFA Verification - Orthodox Pilgrimage</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Antic+Didone&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: auto;
        }
        .login-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            font-family: 'Antic Didone', serif;
            font-size: 2rem;
            color: #530c38;
            margin: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #95a5a6;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1.5rem;
            letter-spacing: 0.3em;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #530c38;
        }
        .login-btn {
            width: 100%;
            background: #530c38;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .login-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(83, 12, 56, 0.3);
        }
        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            text-align: center;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>MFA Required</h1>
            <p style="color: #95a5a6; font-size: 0.85rem; margin-top: 5px; font-weight: 600;">Enter the 6-digit code from your authenticator app.</p>
        </div>
        
        {{if .Error}}
        <div class="error-msg">{{.Error}}</div>
        {{end}}

        <form action="/admin/mfa" method="POST">
            <div class="form-group">
                <input type="text" id="code" name="code" required autofocus autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000">
            </div>
            <button type="submit" class="login-btn">Verify</button>
        </form>
        <div style="text-align: center; margin-top: 20px;">
            <a href="/admin/logout" style="color: #95a5a6; text-decoration: none; font-size: 0.85rem; font-weight: 600;">Cancel and Logout</a>
        </div>
    </div>
</body>
</html>
{{end}}
