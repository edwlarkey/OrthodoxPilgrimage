{{define "admin-relics-edit"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Relic - Admin</title>
    <link rel="stylesheet" href="/static/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Antic+Didone&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" defer></script>
</head>
<body>
    {{template "admin-sidebar" .}}

    <main class="admin-main">
        {{template "admin-topbar" .}}

        <div class="admin-content-area">
            <div class="card max-w-600 p-0">
                <div style="padding: 40px;">
                    <h1 class="mb-0 mt-0 text-bold" style="font-size: 1.8rem; margin-bottom: 30px;">Add Relic Link</h1>
                    
                    <form hx-post="/admin/relics/new" hx-push-url="false">
                        <div class="form-group">
                            <label for="church_id">Church</label>
                            <select id="church_id" name="church_id" required>
                                <option value="">Select a church...</option>
                                {{range .Churches}}
                                <option value="{{.ID}}">{{.Name}} ({{.City}})</option>
                                {{end}}
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="saint_id">Saint</label>
                            <select id="saint_id" name="saint_id" required>
                                <option value="">Select a saint...</option>
                                {{range .Saints}}
                                <option value="{{.ID}}">{{.Name}}</option>
                                {{end}}
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="relic_type_id">Relic Type</label>
                            <select id="relic_type_id" name="relic_type_id">
                                <option value="">Unknown / Other</option>
                                {{range .RelicTypes}}
                                <option value="{{.ID}}">{{.Name}}</option>
                                {{end}}
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="description">Description (e.g. "Right hand", "Particle")</label>
                            <textarea id="description" name="description" rows="3" placeholder="Description of the relic..."></textarea>
                        </div>

                        <div class="flex gap-15 mt-40">
                            <button type="submit" class="btn btn-primary">Link Relic</button>
                            <a href="/admin/relics" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
{{end}}
