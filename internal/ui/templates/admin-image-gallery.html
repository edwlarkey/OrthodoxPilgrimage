{{define "admin-image-gallery"}}
<div class="image-gallery-grid" id="image-gallery-{{.EntityType}}-{{.EntityID}}">
    {{range .Images}}
    <div class="image-item {{if .IsPrimary.Bool}}is-primary{{end}}" id="image-{{.ID}}">
        <div class="image-wrapper">
            <img src="{{.Url}}" alt="{{if .AltText.Valid}}{{.AltText.String}}{{else}}Image{{end}}">
            <div class="image-actions">
                <button class="btn-icon-delete" 
                        hx-delete="/admin/images/delete?id={{.ID}}"
                        hx-confirm="Delete this image forever?"
                        hx-target="#image-{{.ID}}"
                        hx-swap="outerHTML"
                        title="Delete Image">&times;</button>
            </div>
        </div>
        <div class="image-meta">
            <form hx-post="/admin/images/update" hx-swap="none" hx-trigger="change">
                <input type="hidden" name="id" value="{{.ID}}">
                <div class="flex flex-col gap-5">
                    <label class="flex items-center gap-5 text-xxs pointer">
                        <input type="radio" name="is_primary" value="true" {{if .IsPrimary.Bool}}checked{{end}}>
                        Primary Image
                    </label>
                    <input type="text" name="alt_text" value="{{if .AltText.Valid}}{{.AltText.String}}{{end}}" 
                           placeholder="Alt text..." class="text-xxs p-5" style="border: 1px solid var(--border); border-radius: 4px;">
                </div>
            </form>
        </div>
    </div>
    {{else}}
    <div class="text-muted text-center py-20" style="grid-column: 1 / -1;">
        No images uploaded yet.
    </div>
    {{end}}
</div>

<style>
.image-gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 20px;
    margin-top: 20px;
}
.image-item {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
}
.image-item.is-primary {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px var(--primary-light);
}
.image-item.is-primary::after {
    content: 'PRIMARY';
    position: absolute;
    top: 5px;
    left: 5px;
    background: var(--primary);
    color: white;
    font-size: 8px;
    font-weight: bold;
    padding: 2px 5px;
    border-radius: 3px;
    z-index: 2;
}
.image-wrapper {
    position: relative;
    aspect-ratio: 1;
}
.image-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.image-actions {
    position: absolute;
    top: 5px;
    right: 5px;
    opacity: 0;
    transition: opacity 0.2s;
}
.image-item:hover .image-actions {
    opacity: 1;
}
.image-meta {
    padding: 10px;
}
.btn-icon-delete {
    background: rgba(220, 53, 69, 0.9);
    color: white;
    border: none;
    border-radius: 4px;
    width: 24px;
    height: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
}

/* HTMX Indicators */
.htmx-indicator {
    display: none;
}
.htmx-request .htmx-indicator {
    display: block;
}
.htmx-request.htmx-indicator {
    display: block;
}

.spinner {
    width: 20px;
    height: 20px;
    border: 2px solid rgba(0,0,0,.1);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
{{end}}
