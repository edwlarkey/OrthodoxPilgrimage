{{template "base.html" .}}

{{define "content"}}
<div id="map"></div>

<script>
    // Initialize the map and set its view to a default location and zoom
    var map = L.map('map').setView([40.7128, -74.0060], 10); // Default to NYC

    // Add a tile layer from OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    // Fetch church data from our API and add markers to the map
    fetch('/api/v1/churches')
        .then(response => response.json())
        .then(churches => {
            churches.forEach(church => {
                if (church.Latitude && church.Longitude) {
                    L.marker([church.Latitude, church.Longitude]).addTo(map)
                        .bindPopup('<b>' + church.Name + '</b><br>' + church.AddressText);
                }
            });
        })
        .catch(error => console.error('Error loading church data:', error));
</script>
{{end}}
