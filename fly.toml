# fly.toml app configuration file generated for orthodox-pilgrimage on 2026-04-20T14:35:36-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'orthodox-pilgrimage'
primary_region = 'iad'

[build]
  [build.args]
    GO_VERSION = '1.26.2'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[mounts]
  source = "database"
  destination = "/data"

